services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: cashin
            POSTGRES_USER: cashin
            POSTGRES_PASSWORD: cashin_dev_password
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U cashin -d cashin"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    devcontainer:
        build:
            context: ..
            dockerfile: .devcontainer/Dockerfile
        volumes:
            # Mount the whole repo into the container
            - ..:/workspace:cached
            # Persist NuGet & Bun caches across rebuilds
            - nuget-cache:/root/.nuget
            - bun-cache:/root/.bun
        # Keep the container running
        command: sleep infinity
        environment:
            # Make the backend point at the compose DB service
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__DefaultConnection: >-
                Host=db;Port=5432;Database=cashin;Username=cashin;Password=cashin_dev_password
            ENABLE_BANKING_REDIRECT_URL: http://localhost:5080/api/banking/redirect
            DB_PASSWORD: placeholder
        depends_on:
            db:
                condition: service_healthy
        # Needed for .NET HTTPS dev cert
        cap_add:
            - SYS_PTRACE
        security_opt:
            - seccomp:unconfined

volumes:
    pgdata:
    nuget-cache:
    bun-cache:
