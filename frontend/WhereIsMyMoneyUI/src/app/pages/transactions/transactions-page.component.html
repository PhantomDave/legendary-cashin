<app-section-header
  title="Transactions"
  subtitle="A feature page owns its table, filters, and orchestration."
  ctaText="Add Transaction"
  (ctaClicked)="addTransaction()"
/>

<app-paginated-table
  [items]="transactions()?.items ?? []"
  [totalRecords]="transactions()?.totalCount ?? 0"
  [loading]="isLoading()"
  [rows]="rows"
  [first]="first"
  [rowsPerPageOptions]="rowsPerPageOptions"
  (pageChange)="onPageChange($event)"
>
  <ng-template #headerTemplate>
    <tr>
      <th>Date</th>
      <th>Budget</th>
      <th>Categories</th>
      <th>Description</th>
      <th>Amount</th>
      <th>Actions</th>
    </tr>
  </ng-template>

  <ng-template #bodyTemplate let-item>
    <tr>
      <td>
        <p-inplace
          #dateInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{ item.date | date: 'short' }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <p-datepicker
                [(ngModel)]="editingValues()[item.id].date"
                [appendTo]="'body'"
                [showTime]="true"
                ariaLabel="Transaction date"
                size="small"
              />
              <p-button
                (onClick)="saveEdit(item, dateInplace)"
                [loading]="isLoading()"
                aria-label="Save transaction date"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="dateInplace.deactivate()"
                aria-label="Cancel editing transaction date"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-inplace
          #budgetInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{ resolveBudgetName(item.budgetId) }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <p-select
                [(ngModel)]="editingValues()[item.id].budgetId"
                [options]="budgets()"
                ariaLabel="Transaction budget"
                optionLabel="name"
                optionValue="id"
                placeholder="Select budget"
                size="small"
              />
              <p-button
                (onClick)="saveEdit(item, budgetInplace)"
                [loading]="isLoading()"
                aria-label="Save transaction budget"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="budgetInplace.deactivate()"
                aria-label="Cancel editing transaction budget"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-inplace
          #categoriesInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{ resolveCategoryNames(item.categoryIds) }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <p-multiselect
                [(ngModel)]="editingValues()[item.id].categoryIds"
                [options]="categoryOptions()"
                ariaLabel="Transaction categories"
                optionLabel="label"
                optionValue="value"
                placeholder="Select categories"
                size="small"
              />
              <p-button
                (onClick)="saveEdit(item, categoriesInplace)"
                [loading]="isLoading()"
                aria-label="Save transaction categories"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="categoriesInplace.deactivate()"
                aria-label="Cancel editing transaction categories"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-inplace
          #descriptionInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{ item.description }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <input
                [(ngModel)]="editingValues()[item.id].description"
                aria-label="Transaction description"
                pInputText
                size="small"
              />
              <p-button
                (onClick)="saveEdit(item, descriptionInplace)"
                [loading]="isLoading()"
                aria-label="Save transaction description"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="descriptionInplace.deactivate()"
                aria-label="Cancel editing transaction description"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-inplace
          #amountInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{
            item.amount | currency: selectedBudget()?.defaultCurrency
          }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <p-inputnumber
                [(ngModel)]="editingValues()[item.id].amount"
                [maxFractionDigits]="2"
                [minFractionDigits]="2"
                ariaLabel="Transaction amount"
                mode="decimal"
              />
              <p-button
                (onClick)="saveEdit(item, amountInplace)"
                [loading]="isLoading()"
                aria-label="Save transaction amount"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="amountInplace.deactivate()"
                aria-label="Cancel editing transaction amount"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-button
          (onClick)="deleteTransaction($event, item.id)"
          icon="pi pi-trash"
          severity="danger"
          size="small"
        />
      </td>
    </tr>
  </ng-template>
</app-paginated-table>

<p-confirmDialog></p-confirmDialog>

<app-create-transaction-component
  [(visible)]="isCreateTransactionDialogVisible"
  (transactionCreated)="onTransactionCreated()"
/>
