<app-section-header
  title="Transactions"
  subtitle="A feature page owns its table, filters, and orchestration."
  ctaText="Add Transaction"
  (ctaClicked)="addTransaction()"
/>

<app-paginated-table
  [items]="transactions()?.items ?? []"
  [totalRecords]="transactions()?.totalCount ?? 0"
  [loading]="isLoading()"
  [rows]="rows"
  [first]="first"
  [rowsPerPageOptions]="rowsPerPageOptions"
  (pageChange)="onPageChange($event)"
>
  <ng-template #headerTemplate>
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Description</th>
      <th>Amount</th>
    </tr>
  </ng-template>

  <ng-template #bodyTemplate let-item>
    <tr>
      <td>{{ item.date | date: 'short' }}</td>
      <td>{{ item.category }}</td>
      <td>{{ item.description }}</td>
      <td>{{ item.amount | currency: selectedBudget()?.defaultCurrency }}</td>
    </tr>
  </ng-template>
</app-paginated-table>

<app-create-transaction-component
  [(visible)]="isCreateTransactionDialogVisible"
  (transactionCreated)="onTransactionCreated()"
/>
