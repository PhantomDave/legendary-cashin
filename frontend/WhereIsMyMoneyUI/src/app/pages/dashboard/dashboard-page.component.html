<app-section-header
  title="Dashboard"
  subtitle="Start with small feature pages and shared widgets; scale by domain."
/>

<section class="metrics-grid" aria-label="Dashboard overview metrics">
  @for (metric of metrics(); track metric.label) {
    <p-card>
      <ng-template pTemplate="header">
        <div class="dashboard-card__header">
          <span>{{ metric.label }}</span>
          <p-tag [value]="metric.trend" [severity]="metric.severity" />
        </div>
      </ng-template>
      <p class="dashboard-card__value">
        {{
          metric.isCurrency
            ? (metric.value | currency: selectedBudget()?.defaultCurrency)
            : metric.value
        }}
      </p>
    </p-card>
  }
</section>

<section class="charts-grid" aria-label="Dashboard charts">
  <p-card>
    <app-category-spending-chart
      [transactions]="monthTransactions()"
      [categories]="categories()"
      [loading]="isChartLoading()"
    />
  </p-card>

  <p-card>
    <app-budget-utilization-chart
      [categories]="categories()"
      [transactions]="monthTransactions()"
      [loading]="isChartLoading()"
    />
  </p-card>

  <p-card class="charts-grid__wide">
    <app-monthly-trend-chart
      [monthlySummary]="monthlySummary()"
      [loading]="isChartLoading()"
    />
  </p-card>
</section>
