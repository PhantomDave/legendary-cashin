<app-section-header
  (ctaClicked)="addCategory()"
  ctaText="Add Category"
  subtitle="A feature page owns its table, filters, and orchestration."
  title="Categories"
/>

<app-paginated-table
  (pageChange)="onPageChange($event)"
  [first]="first"
  [items]="categories()?.items ?? []"
  [loading]="isLoading()"
  [rowsPerPageOptions]="rowsPerPageOptions"
  [rows]="rows"
  [totalRecords]="categories()?.totalCount ?? 0"
>
  <ng-template #headerTemplate>
    <tr>
      <th>Name</th>
      <th>Budget</th>
      <th>Actions</th>
    </tr>
  </ng-template>

  <ng-template #bodyTemplate let-item>
    <tr>
      <td>
        <p-inplace
          #nameInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
          [closable]="false"
        >
          <ng-template #display>{{ item.name }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <input
                [(ngModel)]="editingValues()[item.id].name"
                aria-label="Category name"
                pInputText
                size="small"
              />
              <p-button
                (onClick)="saveEdit(item, nameInplace)"
                [loading]="isLoading()"
                aria-label="Save name"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="nameInplace.deactivate()"
                aria-label="Cancel editing name"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>

      <td>
        <p-inplace
          #budgetInplace
          (onActivate)="startEdit(item)"
          (onDeactivate)="cancelEdit(item.id)"
        >
          <ng-template #display>{{ item.budget }}</ng-template>
          <ng-template #content>
            <div class="inline-edit-cell">
              <p-inputnumber
                [(ngModel)]="editingValues()[item.id].budget"
                [maxFractionDigits]="2"
                [minFractionDigits]="2"
                aria-label="Category budget"
                inputId="budget-{{ item.id }}"
                mode="decimal"
              ></p-inputnumber>
              <p-button
                (onClick)="saveEdit(item, budgetInplace)"
                [loading]="isLoading()"
                aria-label="Save budget"
                icon="pi pi-check"
                severity="success"
                size="small"
              />
              <p-button
                (onClick)="budgetInplace.deactivate()"
                aria-label="Cancel editing budget"
                icon="pi pi-times"
                severity="secondary"
                size="small"
              />
            </div>
          </ng-template>
        </p-inplace>
      </td>
      <td>
        <p-button (onClick)="deleteCategory($event, item.id)" icon="pi pi-trash" severity="danger" size="small"/>
      </td>
    </tr>
  </ng-template>
</app-paginated-table>

<p-confirmdialog></p-confirmdialog>

<app-create-category-component [visible]="isCreateCategoryModalVisible"/>
