<section class="widget">
  <h3>Budget Utilization</h3>

  @if (loading()) {
    <p-skeleton height="18rem" />
  } @else if (!hasData()) {
    <p-message severity="info" text="No categories available for budget utilization." />
  } @else {
    <div class="chart-container">
      <p-chart
        type="bar"
        [data]="chartData()"
        [options]="chartOptions()"
        [attr.aria-label]="'Budget utilization horizontal bar chart'"
      />
    </div>
  }
</section>
