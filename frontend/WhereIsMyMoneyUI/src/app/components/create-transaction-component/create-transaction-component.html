<div class="min-h-dvh flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
  <p-dialog
    [(visible)]="visible"
    [closable]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [modal]="true"
    [resizable]="false"
    styleClass="w-[92vw] sm:w-[28rem] md:w-[32rem] rounded-2xl shadow-2xl"
  >
    <ng-template pTemplate="header">
      <div class="w-full text-center">
        <h2 class="text-2xl font-semibold m-0">New Transaction</h2>
        <p class="text-sm text-surface-500 m-0 mt-1">Enter your transaction details to continue</p>
      </div>
    </ng-template>

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-wallet"></i></p-inputgroup-addon>
          <p-datepicker
            [showTime]="true"
            [appendTo]="'body'"
            [autoZIndex]="true"
            [baseZIndex]="13000"
            panelStyleClass="create-transaction-datepicker-panel"
            formControlName="date"
            placeholder="Date"
          />
        </p-inputgroup>
        @if (isInvalid('date')) {
          <small class="text-red-500">Date is required.</small>
        }
      </div>
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-calculator"></i></p-inputgroup-addon>
          <input
            formControlName="amount"
            pInputText
            type="number"
            inputmode="decimal"
            step="0.01"
            placeholder="Amount"
          />
        </p-inputgroup>
      </div>

      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-tag"></i></p-inputgroup-addon>
          <input formControlName="description" pInputText placeholder="Description" />
        </p-inputgroup>
      </div>

      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-list"></i></p-inputgroup-addon>
          <input formControlName="category" pInputText placeholder="Category" />
        </p-inputgroup>
      </div>

      <p-button
        class="w-full"
        label="Create Transaction"
        icon="pi pi-plus"
        type="submit"
        [disabled]="transactionForm.invalid"
      ></p-button>
    </form>
  </p-dialog>
</div>
