<p-dialog
  (onShow)="onShow()"
  [(visible)]="visible"
  [closeOnEscape]="true"
  [draggable]="false"
  [modal]="true"
  header="Edit Rule"
  style="width: 560px"
>
  <ng-template #content>
    <form (ngSubmit)="onSubmit()" [formGroup]="form" class="flex flex-col gap-4">
      <!-- Name -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-name">Rule Name *</label>
        <input
          id="edit-rule-name"
          #editNameInput
          formControlName="name"
          pInputText
          aria-label="Rule name"
        />
        @if (isInvalid('name')) {
          <small class="text-red-500">Name is required.</small>
        }
      </div>

      <!-- Active + Priority -->
      <div class="flex gap-4 items-center">
        <div class="flex items-center gap-2">
          <p-checkbox
            formControlName="isActive"
            [binary]="true"
            inputId="edit-rule-active"
            aria-label="Rule active"
          />
          <label for="edit-rule-active">Active</label>
        </div>
        <div class="flex flex-col gap-1 flex-1">
          <label for="edit-rule-priority">Priority</label>
          <p-inputnumber
            formControlName="priority"
            inputId="edit-rule-priority"
            [min]="1"
            aria-label="Priority"
          />
        </div>
      </div>

      <!-- Match Type -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-match-type">Match Type *</label>
        <p-select
          formControlName="matchType"
          [options]="matchTypeOptions"
          [appendTo]="'body'"
          inputId="edit-rule-match-type"
          aria-label="Match type"
        />
      </div>

      <!-- Description Pattern -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-pattern">Description Patterns *</label>
        <textarea
          id="edit-rule-pattern"
          formControlName="descriptionPattern"
          rows="4"
          class="p-inputtext p-component w-full"
          aria-label="Description patterns"
          placeholder="One pattern per line"
        ></textarea>
        @if (isInvalid('descriptionPattern')) {
          <small class="text-red-500">At least one pattern is required.</small>
        }
        <small class="text-color-secondary"
          >Use one pattern per line. A rule matches if any pattern matches.</small
        >
        @if (error()) {
          <small class="text-red-500">{{ error() }}</small>
        }
      </div>

      <!-- Amount Range -->
      <div class="flex gap-4">
        <div class="flex flex-col gap-1 flex-1">
          <label for="edit-rule-min-amount">Min Amount</label>
          <p-inputnumber
            formControlName="minAmount"
            inputId="edit-rule-min-amount"
            mode="decimal"
            [minFractionDigits]="2"
            [maxFractionDigits]="2"
            aria-label="Minimum amount"
          />
        </div>
        <div class="flex flex-col gap-1 flex-1">
          <label for="edit-rule-max-amount">Max Amount</label>
          <p-inputnumber
            formControlName="maxAmount"
            inputId="edit-rule-max-amount"
            mode="decimal"
            [minFractionDigits]="2"
            [maxFractionDigits]="2"
            aria-label="Maximum amount"
          />
        </div>
      </div>

      <!-- Budget Filter -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-budget">Budget Filter (optional)</label>
        <p-select
          formControlName="budgetId"
          [options]="budgetOptions()"
          [showClear]="true"
          [appendTo]="'body'"
          inputId="edit-rule-budget"
          placeholder="Any budget"
          aria-label="Budget filter"
        />
      </div>

      <!-- Days of Week -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-days-of-week">Days of Week (optional)</label>
        <p-multiselect
          formControlName="daysOfWeek"
          [options]="dayOfWeekOptions"
          [appendTo]="'body'"
          inputId="edit-rule-days-of-week"
          placeholder="Any day"
          aria-label="Days of week"
        />
      </div>

      <!-- Day of Month -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-day-of-month">Day of Month (optional, 1–31)</label>
        <p-inputnumber
          formControlName="dayOfMonth"
          inputId="edit-rule-day-of-month"
          [min]="1"
          [max]="31"
          aria-label="Day of month"
        />
      </div>

      <!-- Categories -->
      <div class="flex flex-col gap-1">
        <label for="edit-rule-categories">Assign Categories *</label>
        <p-multiselect
          formControlName="categoryIds"
          [options]="categoryOptions()"
          [appendTo]="'body'"
          inputId="edit-rule-categories"
          placeholder="Select categories"
          aria-label="Target categories"
        />
        @if (isInvalid('categoryIds')) {
          <small class="text-red-500">At least one category is required.</small>
        }
      </div>
    </form>
  </ng-template>

  <ng-template #footer>
    <p-button (onClick)="visible.set(false)" label="Cancel" severity="secondary" />
    <p-button (onClick)="onSubmit()" [loading]="isLoading()" label="Save Changes" />
  </ng-template>
</p-dialog>
