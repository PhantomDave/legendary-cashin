<div class="min-h-dvh flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
  <p-dialog
    [(visible)]="visible"
    [closable]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [modal]="true"
    [resizable]="false"
    styleClass="w-[92vw] sm:w-[28rem] md:w-[32rem] rounded-2xl shadow-2xl"
  >
    <ng-template pTemplate="header">
      <div class="w-full text-center">
        <h2 class="text-2xl font-semibold m-0">New Category</h2>
        <p class="text-sm text-surface-500 m-0 mt-1">Enter your category details to continue</p>
      </div>
    </ng-template>

    <form (ngSubmit)="onSubmit()" [formGroup]="categoryForm" class="flex flex-col gap-3">
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-wallet"></i></p-inputgroup-addon>
          <input formControlName="categoryName" pInputText placeholder="Category Name" />
        </p-inputgroup>
        @if (isInvalid('categoryName')) {
          <small class="text-red-500">Category Name must be at least 3 characters.</small>
        }
      </div>
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-dollar"></i></p-inputgroup-addon>
          <input formControlName="amount" pInputText placeholder="Amount" />
        </p-inputgroup>
      </div>

      <p-button
        [disabled]="categoryForm.invalid"
        class="w-full"
        icon="pi pi-plus"
        label="Create Category"
        type="submit"
      ></p-button>
    </form>
  </p-dialog>
</div>
