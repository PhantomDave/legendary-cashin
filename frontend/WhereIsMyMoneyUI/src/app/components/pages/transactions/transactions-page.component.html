<app-section-header
  title="Transactions"
  subtitle="A feature page owns its table, filters, and orchestration."
  ctaText="Add Transaction"
  [ctaClick]="addTransaction"
/>

<p-table [value]="transactions()" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template pTemplate="header">
    <tr>
      <th>Id</th>
      <th>Date</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Status</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.id }}</td>
      <td>{{ item.date }}</td>
      <td>{{ item.category }}</td>
      <td>{{ item.amount }}</td>
      <td>
        <p-tag [value]="item.status" [severity]="item.status === 'Cleared' ? 'success' : 'warn'" />
      </td>
    </tr>
  </ng-template>
</p-table>
