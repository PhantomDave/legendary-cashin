<div class="app-shell">
  <header class="app-shell__topbar">
    <a class="app-shell__brand" routerLink="/dashboard">Where Is My Money</a>

    <nav aria-label="Main navigation" class="app-shell__nav">
      @for (item of navItems; track item.route) {
        <a
          [class.app-shell__link--active]="isRouteActive(item.route)"
          [routerLink]="item.route"
          class="app-shell__link"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <p-select
      (onChange)="onChange($event.value)"
      [ngModel]="selectedBudget()"
      [options]="budgets()"
      ariaLabel="Select budget"
      optionLabel="name"
      placeholder="Select Budget"
      size="small"
    >
      <ng-template #footer>
        <div class="p-3">
          <p-button
            (onClick)="isCreateModalVisible = true"
            fluid
            icon="pi pi-plus"
            label="Add New"
            severity="secondary"
            size="small"
            text
          />
        </div>
      </ng-template>
    </p-select>
    <p-button
      (onClick)="toggleTheme()"
      [icon]="themeIcon()"
      [rounded]="true"
      [text]="true"
      ariaLabel="Toggle dark mode"
      severity="secondary"
    />
  </header>

  <main class="app-shell__content">
    <router-outlet />
  </main>
</div>

<app-create-budget-component [visible]="isCreateModalVisible"></app-create-budget-component>
