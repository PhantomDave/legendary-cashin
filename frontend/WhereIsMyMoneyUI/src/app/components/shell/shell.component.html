<div class="app-shell">
  <div class="app-shell__body">
    <aside aria-label="Main navigation" class="app-shell__sidebar flex h-full flex-col">
      <a class="app-shell__brand" routerLink="/dashboard">Where Is My Money</a>

      <div class="mt-2 min-h-0 flex-1 overflow-y-auto pr-1">
        <p-panelmenu [model]="navItems" class="app-shell__panelmenu" />
      </div>

      <section
        class="mt-3 grid gap-3 border-t border-[var(--p-content-border-color,var(--p-surface-200))] pt-3"
        aria-label="Preferences"
      >
        <p-select
          (onChange)="onChange($event.value)"
          [ngModel]="selectedBudget()"
          [options]="budgets()"
          ariaLabel="Select budget"
          optionLabel="name"
          placeholder="Select Budget"
          size="small"
          class="app-shell__budget-select"
        >
          <ng-template #footer>
            <div class="p-3">
              <p-button
                (onClick)="isCreateModalVisible = true"
                fluid
                icon="pi pi-plus"
                label="Add New budget"
                severity="secondary"
                size="small"
                text
              />
            </div>
          </ng-template>
        </p-select>

        <p-button
          (onClick)="toggleTheme()"
          [icon]="themeIcon()"
          [label]="isDarkMode() ? 'Dark' : 'Light'"
          [rounded]="false"
          [text]="true"
          ariaLabel="Toggle dark mode"
          severity="secondary"
          styleClass="app-shell__theme-toggle"
        />

        <div
          class="grid gap-2 border-t border-[var(--p-content-border-color,var(--p-surface-200))] pt-3"
        >
          <div class="flex items-center gap-2">
            <p-avatar [label]="userInitial()" shape="circle" />
            <div class="min-w-0">
              <div class="text-sm font-semibold">{{ displayName() }}</div>
              <div class="text-xs text-[var(--p-text-muted-color)]">Signed in</div>
            </div>
          </div>

          <p-button
            (onClick)="logout()"
            icon="pi pi-sign-out"
            label="Logout"
            severity="secondary"
            styleClass="app-shell__theme-toggle"
            text
          />
        </div>
      </section>
    </aside>

    <main class="app-shell__content">
      <router-outlet />
    </main>
  </div>
</div>

<app-create-budget-component [visible]="isCreateModalVisible"></app-create-budget-component>
