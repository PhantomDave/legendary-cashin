<div class="min-h-dvh flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
  <p-dialog
    [(visible)]="visible"
    [closable]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [modal]="true"
    [resizable]="false"
    styleClass="w-[92vw] sm:w-[28rem] md:w-[32rem] rounded-2xl shadow-2xl"
  >
    <ng-template pTemplate="header">
      <div class="w-full text-center">
        <h2 class="text-2xl font-semibold m-0">New Budget</h2>
        <p class="text-sm text-surface-500 m-0 mt-1">Enter your budget details to continue</p>
      </div>
    </ng-template>

    <form [formGroup]="budgetForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-wallet"></i></p-inputgroup-addon>
          <input formControlName="budgetName" pInputText placeholder="Budget Name" />
        </p-inputgroup>
        @if (isInvalid('budgetName')) {
          <small class="text-red-500">Budget Name must be at least 3 characters.</small>
        }
      </div>
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-dollar"></i></p-inputgroup-addon>
          <input formControlName="currency" pInputText placeholder="Currency" />
        </p-inputgroup>
        @if (isInvalid('currency')) {
          <small class="text-red-500">Currency must be at least 3 characters.</small>
        }
      </div>
      <div>
        <p-inputgroup>
          <p-inputgroup-addon><i class="pi pi-calculator"></i></p-inputgroup-addon>
          <input
            formControlName="amount"
            pInputText
            type="number"
            inputmode="decimal"
            min="0"
            step="0.01"
            placeholder="Amount"
          />
        </p-inputgroup>
        @if (isInvalid('amount')) {
          <small class="text-red-500"
            >Amount must be a valid number greater than or equal to 0.</small
          >
        }
      </div>

      <p-button
        class="w-full"
        label="Create Budget"
        icon="pi pi-plus"
        type="submit"
        [disabled]="budgetForm.invalid"
      ></p-button>
    </form>
  </p-dialog>
</div>
