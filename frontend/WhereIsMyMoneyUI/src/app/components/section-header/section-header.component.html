<header class="section-header flex items-center justify-between mb-4">
  <div>
    <h1 class="section-header__title">{{ title() }}</h1>
    @if (subtitle()) {
      <p class="section-header__subtitle">{{ subtitle() }}</p>
    }
  </div>
  @if (ctaText()) {
    <p-button class="section-header__cta" (click)="ctaClicked.emit()">{{ ctaText() }}</p-button>
  }
</header>
