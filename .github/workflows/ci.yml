name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Detect which parts of the codebase changed ─────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ── Run frontend build & tests only when frontend changed ───────────────────
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend.yml

  # ── Run backend build only when backend changed ─────────────────────────────
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml

  # ── Completion gate: required status check for branch protection ────────────
  # This job always runs. Branch protection should require "CI / Completed".
  # - If a relevant build failed  → this job fails  → PR cannot be merged.
  # - If a build was skipped (nothing changed) → this job passes.
  completed:
    name: Completed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: Evaluate build results
        run: |
          frontend="${{ needs.frontend.result }}"
          backend="${{ needs.backend.result }}"

          echo "Frontend result: $frontend"
          echo "Backend result:  $backend"

          if [[ "$frontend" == "failure" || "$frontend" == "cancelled" ]]; then
            echo "❌ Frontend CI failed."
            exit 1
          fi

          if [[ "$backend" == "failure" || "$backend" == "cancelled" ]]; then
            echo "❌ Backend CI failed."
            exit 1
          fi

          echo "✅ All relevant checks passed."
