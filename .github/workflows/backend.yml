name: Backend CI

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore NuGet packages
        run: dotnet restore backend/WhereIsMyMoney.slnx

      - name: Build solution
        run: dotnet build backend/WhereIsMyMoney.slnx --no-restore --configuration Release
